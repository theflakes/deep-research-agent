api:
  openai_base_url: http://localhost:8080/v1
  openai_model: local-model
settings:
  search:
    provider: searxng
    searxng:
      base_url: http://tor-searxng:8888
      # Each web_search does TWO API calls:
      #   1) Standard engines (google, duckduckgo, bing, brave, wikipedia) — regular web results
      #   2) Tor engines (!ahmia !torch) — .onion site results
      tor_engines: ahmia,torch
      standard_engines: google,duckduckgo,bing,brave,wikipedia
  proxy:
    # ALL network connections MUST route through this Tor SOCKS5h proxy.
    # socks5h means DNS resolution also happens through Tor (no DNS leaks).
    # Applies to: web_search, fetch_url_to_workspace, markitdown, DDGS fallback.
    tor_proxy_url: socks5h://tor-proxy:9050
  enable_thinking: false
  concurrency:
    max_concurrent_tasks: 3
  quotas:
    # IMPORTANT: Quotas are GLOBAL (shared across ALL agents in the system).
    # Each key MUST be unique — duplicate YAML keys silently overwrite earlier ones!
    # The engine auto-injects these as prompt format variables: {key_quota}
    # e.g. "web_search: 10" becomes {web_search_quota} = 10 in your prompts.
    # Both flat integers and dict-with-limit are supported.
    delegate_tasks: 20
    web_search: 10
    fetch_url_to_workspace: 20
    write_workspace_file: 20
    write_todos: 30
    read_todos: 30
    think_tool: 30
    read_workspace_file:
      limit: 60
      rules:
        max_lines: 400
    grep_workspace_file:
      limit: 60
      rules:
        max_matches: 15
    list_workspace_files: 20
  enable_conversational_memory: true
  enable_session_persistence: true
  workspace:
    type: disk
    dir: "~/.{APP_NAME}/workspace"
    session_isolation: true # Auto-creates timestamped run folders (e.g. run_1748192400/)
    required_artifact: "final_report.md"
